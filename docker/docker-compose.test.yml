services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres-test
    environment:
      POSTGRES_USER: rag_test_user
      POSTGRES_PASSWORD: rag_test_password
      POSTGRES_DB: rag_test_db
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_test_user -d rag_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
